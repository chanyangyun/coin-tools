<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0a;
    --surface: #171717;
    --surface-soft: rgba(23,23,23,0.4);
    --border: #262626;
    --border-soft: #1f1f1f;
    --text: #f5f5f5;
    --text-dim: #a3a3a3;
    --text-faint: #525252;
    --text-ghost: #404040;
    --accent: #fbbf24;
    --accent-soft: rgba(251,191,36,0.1);
    --emerald: #34d399;
    --sky: #38bdf8;
    --rose: #fb7185;
    --red: #ef4444;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans KR', 'IBM Plex Sans', system-ui, sans-serif;
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .noise {
    position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.9'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }
  .container {
    position: relative; z-index: 1;
    max-width: 1024px; margin: 0 auto;
    padding: 32px 20px;
  }
  @media (min-width: 768px) {
    .container { padding: 48px 32px; }
  }

  /* Header */
  .header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 24px;
    margin-bottom: 40px;
  }
  .header-tag {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: rgba(251,191,36,0.7);
  }
  .pulse-dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .header h1 {
    font-family: 'Playfair Display', 'Noto Serif KR', serif;
    font-size: 2.25rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  @media (min-width: 768px) {
    .header h1 { font-size: 3rem; }
  }
  .header h1 em {
    color: var(--accent);
    font-style: italic;
  }
  .header p {
    color: var(--text-dim);
    font-size: 13px;
    margin-top: 12px;
  }

  /* Input section */
  .input-wrap {
    position: relative;
    margin-bottom: 40px;
  }
  .input-glow {
    position: absolute; inset: -2px;
    background: linear-gradient(90deg, rgba(251,191,36,0.2), rgba(251,191,36,0.2));
    border-radius: 10px;
    filter: blur(8px);
    opacity: 0.3;
    transition: opacity 0.3s;
  }
  .input-wrap:focus-within .input-glow { opacity: 1; }
  .input-card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .input-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(23,23,23,0.5);
  }
  .traffic-lights { display: flex; align-items: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-r { background: rgba(239,68,68,0.6); }
  .dot-y { background: rgba(251,191,36,0.6); }
  .dot-g { background: rgba(52,211,153,0.6); }
  .filename {
    margin-left: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-faint);
  }
  .char-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-ghost);
  }
  textarea {
    width: 100%;
    min-height: 160px;
    background: transparent;
    border: none;
    color: var(--text);
    padding: 16px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
    resize: vertical;
  }
  textarea:focus { outline: none; }
  textarea::placeholder { color: var(--text-ghost); }
  .input-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: rgba(23,23,23,0.3);
    flex-wrap: wrap;
    gap: 8px;
  }
  .detected {
    font-size: 12px;
    color: var(--text-faint);
  }
  .detected .mono { font-family: 'JetBrains Mono', monospace; color: var(--accent); }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--accent);
    color: #0a0a0a;
    padding: 8px 16px;
    border: none;
    border-radius: 4px;
    font-family: 'IBM Plex Sans KR', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn:hover { background: #fcd34d; }
  .btn:disabled {
    background: #262626;
    color: var(--text-ghost);
    cursor: not-allowed;
  }

  /* Preview */
  .preview {
    margin-top: 12px;
    background: rgba(23,23,23,0.4);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .preview-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: rgba(251,191,36,0.7);
    margin-bottom: 12px;
  }
  .preview-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    font-size: 12px;
    padding: 3px 0;
  }
  .preview-date {
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    min-width: 92px;
    flex-shrink: 0;
    padding-top: 2px;
  }
  .preview-sep { color: var(--text-faint); flex-shrink: 0; padding-top: 2px; }
  .preview-count {
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-faint);
    flex-shrink: 0;
    min-width: 36px;
    padding-top: 2px;
  }
  .preview-coins {
    color: var(--text-dim);
    line-height: 1.6;
  }

  /* Compare section */
  .compare-banner {
    margin-bottom: 32px;
    background: var(--surface);
    border: 1px solid rgba(251,191,36,0.3);
    border-radius: 8px;
    padding: 24px;
  }
  .compare-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .compare-title {
    display: flex; align-items: center; gap: 10px;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .close-btn {
    background: none; border: none; color: var(--text-faint);
    cursor: pointer; padding: 4px;
    transition: color 0.15s;
  }
  .close-btn:hover { color: var(--text); }
  .compare-dates {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--accent);
  }
  .compare-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }
  @media (min-width: 768px) {
    .compare-grid { grid-template-columns: repeat(3, 1fr); }
  }
  .compare-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px;
  }
  .compare-card-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    margin-bottom: 12px;
  }
  .compare-card-label.emerald { color: var(--emerald); }
  .compare-card-label.sky { color: var(--sky); }
  .compare-card-label.rose { color: var(--rose); }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 3px;
    border: 1px solid;
  }
  .tag.emerald {
    background: rgba(52,211,153,0.1);
    color: #6ee7b7;
    border-color: rgba(52,211,153,0.2);
  }
  .tag.sky {
    background: rgba(56,189,248,0.1);
    color: #7dd3fc;
    border-color: rgba(56,189,248,0.2);
  }
  .tag.rose {
    background: rgba(251,113,133,0.1);
    color: #fda4af;
    border-color: rgba(251,113,133,0.2);
  }
  .empty { font-size: 11px; color: var(--text-ghost); }

  /* Entries */
  .entries-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .entries-title {
    display: flex; align-items: center; gap: 8px;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .entries-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-faint);
    margin-left: 4px;
  }
  .hint {
    font-size: 12px;
    color: var(--text-faint);
  }
  .empty-state {
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 64px 20px;
    text-align: center;
  }
  .empty-state p { color: var(--text-faint); font-size: 13px; }
  .empty-state p.sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-ghost);
    margin-top: 8px;
  }
  .entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    transition: all 0.2s;
    margin-bottom: 12px;
  }
  .entry:hover { border-color: #333; }
  .entry.active {
    border-color: rgba(251,191,36,0.6);
    box-shadow: 0 10px 30px -10px rgba(251,191,36,0.1);
  }
  .entry-content { padding: 20px; }
  .entry-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .entry-date {
    display: flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin-bottom: 2px;
  }
  .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    padding: 2px 6px;
    border-radius: 3px;
    font-weight: 700;
  }
  .badge.a { background: var(--accent); color: #0a0a0a; }
  .badge.b { background: var(--sky); color: #0a0a0a; }
  .entry-count {

<script>
// ========= STATE =========
const STORAGE_KEY = 'crypto_recommendations_v1';
const WINDOW_KEY = 'crypto_streak_window_v1';
const PRICE_ENABLED_KEY = 'crypto_price_enabled_v1';
const MANUAL_MATCH_KEY = 'crypto_manual_match_v1';
let entries = {};
let selectedDate = null;
let compareDate = null;
let streakWindow = 4;

// 시세 관련
let priceEnabled = false;
let upbitMarkets = []; // 업비트 전체 마켓 목록 [{market, korean_name, english_name}]
let coinMatchMap = {}; // {메모코인이름: 'KRW-XXX' or null}
let manualMatch = {}; // {메모코인이름: 'KRW-XXX' or 'UNMATCH'} - 수동 매칭/제외
let priceData = {}; // {'KRW-XXX': {trade_price, change, change_rate}}
let priceUpdateTimer = null;
let lastPriceUpdate = null;

// ========= STORAGE =========
function loadEntries() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) entries = JSON.parse(raw);
  } catch (e) {
    console.error('불러오기 실패:', e);
    entries = {};
  }
}
function saveEntries() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  } catch (e) {
    console.error('저장 실패:', e);
    alert('저장에 실패했습니다. 브라우저 저장 공간을 확인해주세요.');
  }
}

// ========= PARSING =========
function normalizeDate(y, m, d) {
  return `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
}

function findDateMarkers(text) {
  const markers = [];
  const currentYear = new Date().getFullYear();
  const occupied = [];

  const patterns = [
    { regex: /(\d{4})[-./](\d{1,2})[-./](\d{1,2})/g, extract: (m) => ({ y: m[1], mo: m[2], d: m[3] }) },
    { regex: /(\d{1,2})\s*월\s*(\d{1,2})\s*일/g, extract: (m) => ({ y: currentYear, mo: m[1], d: m[2] }) },
    { regex: /(?:^|\n|\s)(\d{1,2})[-./](\d{1,2})(?=\s|$|\n)/g, extract: (m) => ({ y: currentYear, mo: m[1], d: m[2] }) },
  ];

  for (const { regex, extract } of patterns) {
    let match;
    while ((match = regex.exec(text)) !== null) {
      const start = match.index;
      const end = start + match[0].length;
      let overlap = false;
      for (const [s, e] of occupied) {
        if (!(end <= s || start >= e)) { overlap = true; break; }
      }
      if (overlap) continue;

      const { y, mo, d } = extract(match);
      const monthNum = parseInt(mo, 10);
      const dayNum = parseInt(d, 10);
      if (monthNum < 1 || monthNum > 12 || dayNum < 1 || dayNum > 31) continue;

      occupied.push([start, end]);
      markers.push({ start, end, date: normalizeDate(y, mo, d) });
    }
  }
  return markers.sort((a, b) => a.start - b.start);
}

function tokenizeCoins(text) {
  const cleaned = text.replace(/\([^)]*\)/g, '').replace(/\[[^\]]*\]/g, '');
  const tokens = cleaned
    .split(/[\n,\s/\t;·•・|.]+/)
    .map((t) => t.trim())
    .filter((t) => t.length > 0)
    .filter((t) => !/^\d+$/.test(t))
    .filter((t) => /[가-힣a-zA-Z]/.test(t))
    .filter((t) => !['추천', '종목', '코인', '오늘', '내일', '어제', '원'].includes(t));
  return [...new Set(tokens)].sort((a, b) => a.localeCompare(b, 'ko'));
}

function parseBlocks(text) {
  if (!text.trim()) return [];
  const markers = findDateMarkers(text);

  if (markers.length === 0) {
    const coins = tokenizeCoins(text);
    if (coins.length === 0) return [];
    const today = new Date();
    return [{ date: normalizeDate(today.getFullYear(), today.getMonth() + 1, today.getDate()), coins }];
  }

  const blocks = [];
  if (markers[0].start > 0) {
    const prefix = text.slice(0, markers[0].start);
    const prefixCoins = tokenizeCoins(prefix);
    if (prefixCoins.length > 0) {
      const today = new Date();
      blocks.push({ date: normalizeDate(today.getFullYear(), today.getMonth() + 1, today.getDate()), coins: prefixCoins });
    }
  }

  for (let i = 0; i < markers.length; i++) {
    const m = markers[i];
    const next = markers[i + 1];
    const segment = text.slice(m.end, next ? next.start : text.length);
    const coins = tokenizeCoins(segment);
    if (coins.length > 0) blocks.push({ date: m.date, coins });
  }

  const merged = {};
  for (const b of blocks) {
    if (!merged[b.date]) merged[b.date] = new Set(b.coins);
    else b.coins.forEach((c) => merged[b.date].add(c));
  }
  return Object.entries(merged).map(([date, set]) => ({
    date,
    coins: [...set].sort((a, b) => a.localeCompare(b, 'ko')),
  }));
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function computeStreaks() {
  // 날짜 최신순 정렬
  const allDates = Object.keys(entries).sort((a, b) => b.localeCompare(a));
  if (allDates.length === 0) return null;

  // 윈도우 적용 (0이면 전체)
  const windowDates = streakWindow > 0 ? allDates.slice(0, streakWindow) : allDates;
  const totalDays = windowDates.length;

  // 각 코인이 몇 번 등장했는지 집계
  const coinCount = {};
  for (const date of windowDates) {
    for (const coin of entries[date].coins) {
      if (!coinCount[coin]) coinCount[coin] = { count: 0, dates: [] };
      coinCount[coin].count++;
      coinCount[coin].dates.push(date);
    }
  }

  // 2번 이상 등장한 것만 필터링
  const repeated = Object.entries(coinCount)
    .filter(([_, info]) => info.count >= 2)
    .map(([coin, info]) => ({ coin, count: info.count, dates: info.dates }));

  // 등장 횟수별로 그룹화 (높은 순)
  const groups = {};
  for (const item of repeated) {
    if (!groups[item.count]) groups[item.count] = [];
    groups[item.count].push(item);
  }

  // 각 그룹 내에서 가나다순 정렬
  Object.values(groups).forEach(arr => {
    arr.sort((a, b) => a.coin.localeCompare(b.coin, 'ko'));
  });

  return { groups, totalDays, windowDates };
}

function renderStreak() {
  const section = document.getElementById('streakSection');
  const totalEntries = Object.keys(entries).length;

  // 기록이 2개 미만이면 숨김
  if (totalEntries < 2) {
    section.classList.add('hidden');
    return;
  }
  section.classList.remove('hidden');

  const result = computeStreaks();
  if (!result) return;

  const { groups, totalDays, windowDates } = result;
  const metaEl = document.getElementById('streakMeta');
  const contentEl = document.getElementById('streakContent');

  // 메타 정보
  const fromDate = windowDates[windowDates.length - 1];
  const toDate = windowDates[0];
  metaEl.textContent = `WINDOW: ${fromDate} → ${toDate} · ${totalDays}일 분석`;

  // 등장 횟수 내림차순
  const countLevels = Object.keys(groups).map(Number).sort((a, b) => b - a);

  if (countLevels.length === 0) {
    contentEl.innerHTML = '<div class="streak-empty">2회 이상 연속 추천된 코인이 없어요</div>';
    return;
  }

  // 색상 결정: 최고 레벨은 hot, 그 다음은 warm, 나머지는 mild
  const html = countLevels.map((count, idx) => {
    let cls, labelCls;
    if (idx === 0) { cls = 'hot'; labelCls = 'streak-label-hot'; }
    else if (idx === 1) { cls = 'warm'; labelCls = 'streak-label-warm'; }
    else { cls = 'mild'; labelCls = 'streak-label-mild'; }

    const items = groups[count];
    const tags = items.map(item => {
      let priceHtml = '';
      if (priceEnabled) {
        const market = coinMatchMap[item.coin];
        if (market && priceData[market]) {
          const data = priceData[market];
          const rate = data.change_rate * 100;
          const sign = rate > 0 ? '+' : '';
          const pcls = data.change === 'RISE' ? 'up' : data.change === 'FALL' ? 'down' : 'flat';
          const arrow = data.change === 'RISE' ? '▲' : data.change === 'FALL' ? '▼' : '·';
          priceHtml = `<span class="coin-price ${pcls}" style="margin-left:4px">${arrow}${sign}${rate.toFixed(2)}%</span>`;
        }
      }
      return `<span class="streak-tag ${cls}">${escapeHtml(item.coin)}<span class="freq">${item.count}회</span>${priceHtml}</span>`;
    }).join('');

    return `
      <div class="streak-group">
        <div class="streak-group-label ${labelCls}">
          <span>${count}일 / ${totalDays}일 등장</span>
          <span class="count-badge">${items.length}종목</span>
        </div>
        <div class="streak-tags">${tags}</div>
      </div>
    `;
  }).join('');

  contentEl.innerHTML = html;
}

// ========= 업비트 시세 =========

// 한글 정규화 (공백, 특수문자 제거 + 소문자)
function normalizeKoreanName(s) {
  return String(s || '').replace(/[\s\-_·.]/g, '').toLowerCase();
}

// 메모 이름 → 업비트 마켓 매칭
function matchCoinToMarket(memoName) {
  if (!upbitMarkets.length) return null;
  
  const normMemo = normalizeKoreanName(memoName);
  const normMemoNoAi = normMemo.replace(/(에이아이|ai)$/i, ''); // "홀로월드에이아이" → "홀로월드"
  
  // 1. 완전 일치 (한글명)
  for (const m of upbitMarkets) {
    if (normalizeKoreanName(m.korean_name) === normMemo) return m.market;
  }
  
  // 2. 영문명 일치
  for (const m of upbitMarkets) {
    if (normalizeKoreanName(m.english_name) === normMemo) return m.market;
  }
  
  // 3. AI 접미사 무시 매칭
  if (normMemoNoAi !== normMemo) {
    for (const m of upbitMarkets) {
      const k = normalizeKoreanName(m.korean_name).replace(/(에이아이|ai)$/i, '');
      if (k === normMemoNoAi) return m.market;
    }
  }
  
  // 4. 부분 매칭 (메모이름이 업비트명에 포함)
  for (const m of upbitMarkets) {
    const normK = normalizeKoreanName(m.korean_name);
    if (normMemo.length >= 2 && (normK === normMemo || normK.startsWith(normMemo) || normMemo.startsWith(normK))) {
      // 너무 짧은 매칭은 제외 (예: "비" → "비트코인"은 위험)
      if (Math.abs(normK.length - normMemo.length) <= 4) {
        return m.market;
      }
    }
  }
  
  return null;
}

// 모든 메모 코인에 대해 매칭 수행
function buildCoinMatchMap() {
  const allCoins = new Set();
  for (const date of Object.keys(entries)) {
    for (const coin of entries[date].coins) allCoins.add(coin);
  }
  coinMatchMap = {};
  for (const coin of allCoins) {
    // 1) 수동 매칭이 있으면 우선
    if (manualMatch[coin]) {
      if (manualMatch[coin] === 'UNMATCH') {
        coinMatchMap[coin] = null;
      } else {
        coinMatchMap[coin] = manualMatch[coin];
      }
    } else {
      // 2) 자동 매칭 시도
      coinMatchMap[coin] = matchCoinToMarket(coin);
    }
  }
}

// 업비트 API fetch (CORS 우회)
// 1) 직접 호출 시도 → 2) 실패하면 프록시 사용
let useProxy = false;
const CORS_PROXIES = [
  (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
];

async function fetchUpbit(apiUrl) {
  // 이미 프록시 사용 중이면 바로 프록시로
  if (useProxy) {
    for (const proxyFn of CORS_PROXIES) {
      try {
        const res = await fetch(proxyFn(apiUrl));
        if (res.ok) return await res.json();
      } catch (e) { /* 다음 프록시 시도 */ }
    }
    throw new Error('모든 프록시 실패');
  }
  
  // 1) 직접 호출 시도
  try {
    const res = await fetch(apiUrl);
    if (res.ok) return await res.json();
    throw new Error('Direct fetch failed');
  } catch (err) {
    // 2) 실패하면 프록시로 전환
    console.log('직접 호출 실패, 프록시로 전환합니다');
    useProxy = true;
    for (const proxyFn of CORS_PROXIES) {
      try {
        const res = await fetch(proxyFn(apiUrl));
        if (res.ok) return await res.json();
      } catch (e) { /* 다음 프록시 시도 */ }
    }
    throw new Error('모든 프록시 실패');
  }
}

// 업비트 마켓 목록 가져오기 (최초 1회)
async function loadUpbitMarkets() {
  if (upbitMarkets.length > 0) return true;
  try {
    const data = await fetchUpbit('https://api.upbit.com/v1/market/all?is_details=false');
    upbitMarkets = data.filter(m => m.market.startsWith('KRW-'));
    return true;
  } catch (err) {
    console.error('업비트 마켓 로드 실패:', err);
    return false;
  }
}

// 시세 정보 가져오기
async function fetchPrices() {
  // 매칭된 마켓들만 모음
  const markets = [...new Set(Object.values(coinMatchMap).filter(Boolean))];
  if (markets.length === 0) return;
  
  try {
    // 업비트는 한 번에 100개까지 가능, 청크로 분할
    const chunks = [];
    for (let i = 0; i < markets.length; i += 100) {
      chunks.push(markets.slice(i, i + 100));
    }
    
    for (const chunk of chunks) {
      const url = `https://api.upbit.com/v1/ticker?markets=${chunk.join(',')}`;
      const data = await fetchUpbit(url);
      for (const item of data) {
        priceData[item.market] = {
          trade_price: item.trade_price,
          change: item.change, // 'RISE', 'FALL', 'EVEN'
          change_rate: item.signed_change_rate, // 변동률 (소수)
        };
      }
    }
    lastPriceUpdate = new Date();
    updatePriceStatus('live', '');
    renderEntries();
    if (typeof renderStreak === 'function') renderStreak();
  } catch (err) {
    console.error('시세 조회 실패:', err);
    updatePriceStatus('error', 'ERROR');
  }
}

// 가격 상태 표시 업데이트
function updatePriceStatus(state, text) {
  const statusEl = document.getElementById('priceStatus');
  const dotEl = document.getElementById('priceDot');
  const textEl = document.getElementById('priceStatusText');
  if (!statusEl || !dotEl || !textEl) return;
  
  if (!priceEnabled) {
    statusEl.style.display = 'none';
    return;
  }
  statusEl.style.display = 'flex';
  
  dotEl.className = 'price-dot ' + (state === 'live' ? 'live' : state === 'error' ? 'error' : '');
  
  if (text) {
    textEl.textContent = text;
  } else if (lastPriceUpdate) {
    const t = lastPriceUpdate;
    const hh = String(t.getHours()).padStart(2, '0');
    const mm = String(t.getMinutes()).padStart(2, '0');
    const ss = String(t.getSeconds()).padStart(2, '0');
    textEl.textContent = `LIVE · ${hh}:${mm}:${ss}`;
  } else {
    textEl.textContent = state === 'loading' ? 'LOADING...' : 'OFF';
  }
}

// 가격 포맷팅
function formatPrice(price) {
  if (price >= 1000000) return Math.round(price).toLocaleString('ko-KR');
  if (price >= 1000) return Math.round(price).toLocaleString('ko-KR');
  if (price >= 100) return price.toFixed(1);
  if (price >= 1) return price.toFixed(2);
  return price.toFixed(4);
}

      .map(m => {
        const k = normalizeKoreanName(m.korean_name);
        const e = (m.english_name || '').toLowerCase();
        let score = 0;
        // 완전 일치 우선
        if (k === memoNorm) score = 100;
        else if (k.includes(memoNorm) || memoNorm.includes(k)) score = 80;
        else if (k.startsWith(memoNorm.slice(0, 2))) score = 50;
        return { ...m, score };
      })
      .filter(m => m.score > 0)
      .sort((a, b) => b.score - a.score)
      .slice(0, 30);
    
    // 비슷한 게 없으면 그냥 처음 30개
    if (filtered.length === 0) {
      filtered = upbitMarkets.slice(0, 30);
    }
  } else {
    filtered = upbitMarkets.filter(m => {
      const k = m.korean_name.toLowerCase();
      const e = (m.english_name || '').toLowerCase();
      const t = m.market.toLowerCase();
      return k.includes(norm) || e.includes(norm) || t.includes(norm);
    }).slice(0, 50);
  }
  
  if (filtered.length === 0) {
    list.innerHTML = '<div class="market-empty">검색 결과가 없어요</div>';
    return;
  }
  
  list.innerHTML = filtered.map(m => `
    <div class="market-item" onclick="selectMatch('${m.market}')">
      <div class="market-name">
        ${escapeHtml(m.korean_name)}
        ${m.english_name ? `<span class="eng">${escapeHtml(m.english_name)}</span>` : ''}
      </div>
      <span class="market-ticker">${m.market}</span>
    </div>
  `).join('');
}

window.selectMatch = function(market) {
  if (!modalCurrentCoin) return;
  manualMatch[modalCurrentCoin] = market;
  saveManualMatch();
  buildCoinMatchMap();
  closeMatchModal();
  // 새로 매칭한 코인 시세 즉시 가져오기
  fetchPrices();
};

function unmatchCurrent() {
  if (!modalCurrentCoin) return;
  manualMatch[modalCurrentCoin] = 'UNMATCH';
  saveManualMatch();
  buildCoinMatchMap();
  closeMatchModal();
  renderEntries();
  if (typeof renderStreak === 'function') renderStreak();
}

function resetMatch() {
  if (!modalCurrentCoin) return;
  delete manualMatch[modalCurrentCoin];
  saveManualMatch();
  buildCoinMatchMap();
  closeMatchModal();
  fetchPrices();
}

async function togglePrice() {
  priceEnabled = !priceEnabled;
  try { localStorage.setItem(PRICE_ENABLED_KEY, priceEnabled ? '1' : '0'); } catch(e) {}
  
  const btn = document.getElementById('priceToggle');
  if (priceEnabled) {
    btn.classList.add('active');
    updatePriceStatus('loading', 'LOADING...');
    
    // 마켓 정보 로드
    const ok = await loadUpbitMarkets();
    if (!ok) {
      updatePriceStatus('error', 'API 접속 실패');
      return;
    }
    
    // 매칭 수행
    buildCoinMatchMap();
    
    // 시세 가져오기
    await fetchPrices();
    
    // 30초마다 자동 갱신
    if (priceUpdateTimer) clearInterval(priceUpdateTimer);
    priceUpdateTimer = setInterval(fetchPrices, 30000);
  } else {
    btn.classList.remove('active');
    if (priceUpdateTimer) {
      clearInterval(priceUpdateTimer);
      priceUpdateTimer = null;
    }
    updatePriceStatus('off');
    renderEntries();
    if (typeof renderStreak === 'function') renderStreak();
  }
}

// ========= ACTIONS =========
window.startCompare = (date) => { selectedDate = date; renderAll(); };
window.cancelCompare = () => { selectedDate = null; compareDate = null; renderAll(); };
window.setCompareB = (date) => { compareDate = date; renderAll(); };
window.deleteEntry = (date) => {
  if (!confirm(`${date} 기록을 삭제할까요?`)) return;
  delete entries[date];
  if (selectedDate === date) selectedDate = null;
  if (compareDate === date) compareDate = null;
  saveEntries();
  renderAll();
};

document.getElementById('saveBtn').addEventListener('click', () => {
  const text = document.getElementById('inputArea').value;
  const blocks = parseBlocks(text);
  if (blocks.length === 0) return;

  for (const block of blocks) {
    if (entries[block.date]) {
      const existing = new Set(entries[block.date].coins);
      block.coins.forEach(c => existing.add(c));
      entries[block.date] = {
        coins: [...existing].sort((a, b) => a.localeCompare(b, 'ko')),
        savedAt: new Date().toISOString(),
      };
    } else {
      entries[block.date] = { coins: block.coins, savedAt: new Date().toISOString() };
    }
  }
  saveEntries();
  document.getElementById('inputArea').value = '';
  renderPreview();
  
  // 시세가 켜져있으면 새 코인 매칭 + 시세 가져오기
  if (priceEnabled && upbitMarkets.length > 0) {
    buildCoinMatchMap();
    fetchPrices();
  }
  
  renderAll();
});

document.getElementById('inputArea').addEventListener('input', renderPreview);
document.getElementById('closeCompare').addEventListener('click', () => {
  selectedDate = null;
  compareDate = null;
  renderAll();
});

// 윈도우 선택 버튼
document.querySelectorAll('.window-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const newWindow = parseInt(btn.dataset.window, 10);
    streakWindow = newWindow;
    try { localStorage.setItem(WINDOW_KEY, String(newWindow)); } catch(e) {}
    document.querySelectorAll('.window-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderStreak();
  });
});

// 저장된 윈도우 설정 불러오기
try {
  const savedWindow = localStorage.getItem(WINDOW_KEY);
  if (savedWindow !== null) {
    streakWindow = parseInt(savedWindow, 10);
    document.querySelectorAll('.window-btn').forEach(b => {
      b.classList.toggle('active', parseInt(b.dataset.window, 10) === streakWindow);
    });
  }
} catch(e) {}

// 시세 토글 버튼 이벤트
document.getElementById('priceToggle').addEventListener('click', togglePrice);

// 모달 이벤트 연결
document.getElementById('modalCloseBtn').addEventListener('click', closeMatchModal);
document.getElementById('modalUnmatchBtn').addEventListener('click', unmatchCurrent);
document.getElementById('modalResetBtn').addEventListener('click', resetMatch);
document.getElementById('matchModal').addEventListener('click', (e) => {
  if (e.target.id === 'matchModal') closeMatchModal();
});
document.getElementById('modalSearch').addEventListener('input', (e) => {
  renderMarketList(e.target.value);
});
// ESC로 모달 닫기
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeMatchModal();
});

// 저장된 시세 모드 복원 (페이지 새로고침해도 유지)
try {
  const savedPriceEnabled = localStorage.getItem(PRICE_ENABLED_KEY);
  if (savedPriceEnabled === '1') {
    // 자동으로 켜기 (약간 지연 후)
    setTimeout(() => {
      togglePrice();
    }, 300);
  }
} catch(e) {}

// 페이지 떠날 때 타이머 정리
window.addEventListener('beforeunload', () => {
  if (priceUpdateTimer) clearInterval(priceUpdateTimer);
});

// ========= INIT =========
loadEntries();
loadManualMatch();
renderPreview();
renderAll();
</script>
</body>
